<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Ines</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #3a0ca3);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 40px 30px;
      border-radius: 25px;
      text-align: center;
      max-width: 380px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      backdrop-filter: blur(15px);
      animation: fadeIn 1.2s ease;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
      z-index: 2;
    }

    .img-box {
      width: 200px;
      height: 200px;
      margin: auto;
      border-radius: 50%;
      padding: 6px;
      background: linear-gradient(45deg, #ff4d6d, #ff9a9e, #c77dff);
      animation: glow 3s infinite alternate;
      transition: 0.3s;
    }

    .img-box:hover {
      transform: scale(1.06) rotate(2deg);
    }

    .img-box img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: 23px;
      color: #ff8fab;
    }

    p {
      font-size: 14px;
      line-height: 1.6;
      color: #ddd;
      margin-top: 10px;
    }

    h4 {
      margin-top: 15px;
      font-size: 13px;
      color: #ffb3c6;
      font-style: italic;
    }

    .timer {
      margin-top: 18px;
      font-size: 14px;
      color: #ff4d6d;
      font-weight: bold;
    }

    .badge {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #ff4d6d;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    .btn {
      margin-top: 15px;
      padding: 10px 15px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(45deg, #ff4d6d, #c77dff);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes glow {
      from {
        box-shadow: 0 0 10px #ff4d6d;
      }
      to {
        box-shadow: 0 0 30px #c77dff;
      }
    }

    .love {
      position: absolute;
      bottom: -20px;
      color: rgba(255,255,255,0.25);
      animation: floatUp linear forwards;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0);
        opacity: 1;
      }
      to {
        transform: translateY(-110vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="badge">💖 My Love</div>

    <div class="img-box">
      <img src="wanita_tercantik.jpg">
    </div>

    <h1>AKUU SAYANGG INESSS</h1>

    <p>
      terimakasih sayang telah hadir di hidupku, walau terkadang aku membuat kamu marah dan jengkel tapi sungguh ku sayang padamu, dan akupun berharap sebaliknya, semoga perjalanan kita akan selalu berakhir bahagia
    </p>

    <h4>kudoakan cinta kita bertahan untuk selama lama lamanya</h4>

    <div class="timer" id="timer"></div>

    <button class="btn" onclick="alert('loveeyouuuu sayanggg')">Klik ini</button>
  </div>

  <script>
    const startDate = new Date("2025-03-01 00:00:00");

    function updateTimer() {
      const now = new Date();
      const diff = now - startDate;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("timer").innerText =
        "Udah bareng: " + days + " hari " +
        hours + " jam " +
        minutes + " menit " +
        seconds + " detik 💖";
    }

    setInterval(updateTimer, 1000);
    updateTimer();

    function createLove() {
      const love = document.createElement("div");
      love.className = "love";
      love.innerText = "❤";
      love.style.left = Math.random() * 100 + "vw";
      love.style.fontSize = (Math.random() * 20 + 10) + "px";
      love.style.animationDuration = (Math.random() * 4 + 4) + "s";
      document.body.appendChild(love);

      setTimeout(() => {
        love.remove();
      }, 8000);
    }

    // lebih rame tapi ga spam brutal
    setInterval(createLove, 300);
  </script>

</body>
</html>
